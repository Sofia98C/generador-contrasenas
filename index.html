<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Crypta - Generador de Contraseñas</title>
</head>
<body>
    <div class="wrapper">
       <header>
        <span class="logo">Crypta</span>
        <p class="tagline"> Contraseñas Seguras, Personalizadas y al instante</p>
       </header>

       <main>
        <div class="password-card">
            <div class="password-display">
                <span id="password-output">Presioná generar</span>
                <button class="icon-btn" id="copy-btn" title="Copiar "> 
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>

            <div class="strength-section">
                <div class="strength-meta">
                    <span class="strength-label-txt">Seguridad</span>
                    <span id="strength-text" class="strength/value">-</span>
                </div>
                <div class="strenght-track">
                    <div class="strength-fill" id="strength-fill"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="control-row slider-row">
                <label for="length-slider">Largo</label>
                <div class="slider-wrap">
                    <input type="range" id="length-slider" min="6" max="40" value="16" step="1">
                </div>
                <span id="length-val" class="length-val">16</span>
            </div>

            <div class="divider"></div>

            <div class="checkboxes">
                <label class="check-row">
                    <input type="checkbox" id="opt-upper" checked />
                    <span class="check-box"></span>
                Mayúsculas<em>A-Z</em>
                </label>
                <label class="clack-row">
                    <input type="checkbox" id="opt-lower" checked />
                    <span class="check-box"></span>
                Minúsculas<em>a-z</em>
                <label class="check-row">
                    <input type="checkbox" id="opt-numbers" checked />
                    <span class="check-box"></span>
                Números<em>0-9</em>
                    <label class="check-row">
                        <input type="checkbox" id="opt-symbols" checked />
                        <span class="check-box"></span>
                    Símbolos<em>!@#$%</em>
                </label>
            </div>

            <div class="divider"></div>

            <button class="generate-btn" >
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            Generar contraseña
            </button>
            <footer>
                <p>Crypta · 2026</p>
            </footer>
        </div>
       </main>
    </div>
</body>
</html>
